name: Server Watcher Cron

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-servers:
    runs-on: ubuntu-latest
    steps:
      - name: Call watcher cron endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SITE_URL }}/api/cron/watcher"
