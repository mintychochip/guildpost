name: Build and Deploy to GCP VM

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  GCP_PROJECT: manifest-virtue-492800-p9
  GCP_ZONE: us-west1-b
  GCP_INSTANCE: guildpost-worker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro for Cloudflare
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MIXEDBREAD_API_KEY: ${{ secrets.MIXEDBREAD_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Copy files to GCP VM
        run: |
          # Create tarball
          tar -czf dist.tar.gz dist/
          
          # Copy to VM home directory
          gcloud compute scp --zone=$GCP_ZONE \
            --tunnel-through-iap \
            dist.tar.gz $GCP_INSTANCE:~/

      - name: Start server on VM
        run: |
          # SSH and setup using Python HTTP server on port 8080 (no sudo needed)
          gcloud compute ssh $GCP_INSTANCE --zone=$GCP_ZONE \
            --tunnel-through-iap \
            --command='export HOME=/home/justin-lo && mkdir -p ~/guildpost && cd ~/guildpost && tar -xzf ~/dist.tar.gz && pkill -f "http.server" 2>/dev/null || true && cd dist && nohup python3 -m http.server 8080 > ~/server.log 2>&1 &'
            
      - name: Open firewall for port 8080
        run: |
          gcloud compute firewall-rules create allow-http-8080 \
            --direction=INGRESS --priority=1000 --network=default \
            --action=ALLOW --rules=tcp:8080 --source-ranges=0.0.0.0/0 \
            --target-tags=http-server 2>/dev/null || echo "Firewall rule may already exist"