<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>GuildPost - Loading Server</title>
  <style>body{font-family:sans-serif;text-align:center;padding:50px;background:#0a0a0f;color:#fff}</style>
  <script>
    var path = window.location.pathname;
    var uuid = path.replace(/^\/servers\//, '').replace(/\/$/, '');
    var uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    
    if (uuidRegex.test(uuid)) {
      window.location.replace('/servers/index.html?id=' + uuid + '&t=' + Date.now());
    } else {
      document.body.innerHTML = '<h1>Page Not Found</h1><p><a href="/" style="color:#00f5d4">Go Home</a></p>';
    }
  </script>
</head>
<body>
  <p>Loading server...</p>
</body>
</html>
