<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GuildPost - Server</title>
  <script>
    (function() {
      var path = window.location.pathname;
      // Match UUID with or without trailing slash
      var match = path.match(/^\/servers\/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\/?$/i);
      if (match) {
        window.location.replace('/servers/index.html?id=' + match[1]);
      } else {
        document.body.innerHTML = '<h1>Page Not Found</h1><p><a href="/">Go Home</a></p>';
      }
    })();
  </script>
</head>
<body>
  <p>Loading server...</p>
</body>
</html>
