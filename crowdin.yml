# Crowdin Configuration for GuildPost
# https://crowdin.com/project/guildpost

project_id: "" # Fill in after creating project
api_token: "" # Set via CROWDIN_PERSONAL_TOKEN env var
base_path: "."
base_url: "https://api.crowdin.com"

preserve_hierarchy: true

files:
  # Source translation files
  - source: "/public/locales/en/*.json"
    translation: "/public/locales/%two_letters_code%/%original_file_name%"
    
  # Component-level translations
  - source: "/src/locales/en.json"
    translation: "/src/locales/%two_letters_code%.json"
